<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ArtConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="submit-pagebg">
    <header class="sitewide-header">
        <div class="logo">
          <img src="../images/logowhite.png" alt="logowhite">
        </div>

        <nav class="homepage-nav">
            <a href="../index.html">HOME</a>
            <a href="gallery.html">GALLERY</a>
            <a href="events.html">EVENTS</a>
            <a href="submit.html" class="active">SUBMIT ART</a>
            <a href="faq.html">FAQ</a>
            <a href="references.html">REFERENCES</a>
        </nav>
    </header>

<section class="submission-section">
    <h2 class="submission-title">Submit Your Artwork</h2>
    <p class="submission-firstline">
        Fill out the form below to submit your artwork.
    </p>

    <form id="artSubmissionForm" class="submission-form">

        <div class="form-group">
            <label for="artistName">Artist Name</label>
            <input type="text" id="artistName" placeholder="Your first and last name">
        </div>

        <div class="form-group">
            <label for="artistEmail">Email Address</label>
            <input type="email" id="artistEmail" placeholder="yourname@example.com">
        </div>

        <div class="form-group">
            <label for="artTitle">Artwork Title</label>
            <input type="text" id="artTitle" placeholder="Title of your awesome art!">
        </div>

        <div class="form-group">
            <label for="artCategory">Category</label>
            <select id="artCategory" name="artCategory">
                <option value="">Select a Category</option>
                <option value="painting">Painting</option>
                <option value="digital">Digital Art</option>
                <option value="photography">Photography</option>
                <option value="sculpture">Sculpture</option>
                <option value="mixed">Mixed Media</option>
                <option value="crafts">Crafts</option>
                <option value="pencil or ink">Pencil or Ink</option>
                <option value="pastels or crayon">Pastels or Crayon</option>
                <option value="woodworking">Woodworking</option>
            </select>
        </div>

        <div class="form-group">
            <label for="artFile">Upload Artwork</label>
            <input type="file" id="artFile" accept="image/*">
        </div>

        <div class="form-group">
            <label for="artDescription">Artwork Description</label>
            <textarea id="artDescription" rows="5" placeholder="Describe your artwork..."></textarea>
        </div>

        <div class="preview-box">
            <p class="preview-label">Artwork Preview</p>
            <img id="previewImage" class="preview-image" src="" alt="Preview will appear here">
        </div>

        <button type="submit" class="submit-button">Submit Artwork</button>

    </form>
</section>

<script src="../js/script.js"></script>
</body>
</html>
